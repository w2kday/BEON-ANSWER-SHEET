<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영어영문답사 명단 조회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:      #f9c7dc;
    --pink-mid:  #f0a0c0;
    --pink-deep: #c4607a;
    --pink-dark: #7a2e45;
    --bg:        #fef6f9;
    --surface:   #ffffff;
    --text:      #2c1018;
    --text-muted:#9a6475;
    --border:    rgba(249,199,220,0.6);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 16px;
    position: relative; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed;
    width: 480px; height: 480px;
    background: radial-gradient(circle, rgba(249,199,220,.35) 0%, transparent 70%);
    top: -120px; right: -120px; border-radius: 50%; pointer-events: none;
  }
  body::after {
    content: ''; position: fixed;
    width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(249,199,220,.25) 0%, transparent 70%);
    bottom: -80px; left: -80px; border-radius: 50%; pointer-events: none;
  }
  .dot-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: radial-gradient(circle, rgba(249,199,220,.4) 1px, transparent 1px);
    background-size: 28px 28px;
  }
  .wrap { position: relative; z-index: 1; width: 100%; max-width: 420px; }

  /* 헤더 */
  .site-header { text-align: center; margin-bottom: 24px; }
  .site-title {
    font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
    color: var(--pink-deep); font-weight: 300; display: block; margin-bottom: 8px;
  }
  .site-title-kr { font-size: 22px; font-weight: 700; color: var(--text); }
  .title-line {
    display: flex; align-items: center; gap: 12px;
    justify-content: center; margin-top: 12px;
  }
  .title-line::before { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--pink-mid)); }
  .title-line::after  { content: ''; flex: 1; height: 1px; background: linear-gradient(to left,  transparent, var(--pink-mid)); }
  .title-line span { font-size: 14px; }

  /* 카드 */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 28px 22px;
    box-shadow: 0 4px 28px rgba(249,100,140,.07);
  }

  /* 공통 인풋 */
  .field { margin-bottom: 12px; }
  .field label {
    display: block; font-size: 11px; font-weight: 700;
    color: var(--pink-deep); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .field input {
    width: 100%; padding: 13px 16px;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif; outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus {
    border-color: var(--pink-mid);
    box-shadow: 0 0 0 4px rgba(249,199,220,.3);
  }

  /* 버튼 */
  .btn-main {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--pink), var(--pink-mid));
    color: var(--pink-dark); border: none; border-radius: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 4px 16px rgba(240,160,192,.35);
  }
  .btn-main:hover { transform: translateY(-2px); }

  .err-msg { font-size: 13px; color: #c0506a; min-height: 20px; margin-top: 10px; text-align: center; }
  .err-msg.shake { animation: shake .35s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }

  /* 로그인 */
  #login-screen { text-align: left; }
  .lock-emoji {
    font-size: 44px; display: block; margin-bottom: 16px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .card-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .card-sub { font-size: 13px; color: var(--text-muted); font-weight: 300; margin-bottom: 24px; }

  /* 메인 화면 */
  #main-screen { display: none; }

  /* 검색창 */
  .search-wrap { margin-bottom: 18px; }
  .search-wrap input {
    width: 100%; padding: 13px 16px;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif; outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .search-wrap input:focus {
    border-color: var(--pink-mid);
    box-shadow: 0 0 0 4px rgba(249,199,220,.3);
  }

  /* 브라우즈 버튼 3개 */
  .browse-btns {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 18px;
  }
  .browse-btn {
    padding: 14px 8px;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 12px; text-align: center;
    cursor: pointer; transition: all .2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .browse-btn:hover { border-color: var(--pink-mid); transform: translateY(-2px); background: rgba(249,199,220,.1); }
  .browse-btn .icon { font-size: 22px; display: block; margin-bottom: 6px; }
  .browse-btn .label { font-size: 13px; font-weight: 700; color: var(--text); }
  .browse-btn .sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  /* 구분선 */
  .divider {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; color: var(--text-muted); font-size: 11px;
    letter-spacing: 1px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* 검색 결과 */
  #result-area { min-height: 20px; }
  .result-card {
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 16px 14px; margin-bottom: 10px;
    animation: popIn .3s cubic-bezier(.175,.885,.32,1.275);
  }
  @keyframes popIn { from{opacity:0;transform:translateY(8px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
  .result-name {
    font-size: 17px; font-weight: 700; color: var(--text);
    margin-bottom: 12px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .result-name .student-id { font-size: 12px; font-weight: 400; color: var(--text-muted); margin-left: auto; }
  .staff-badge {
    font-size: 11px; font-weight: 700; color: var(--pink-deep);
    background: rgba(249,199,220,.4); border: 1px solid var(--pink-mid);
    border-radius: 6px; padding: 1px 6px; letter-spacing: 0.5px;
  }
  .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .info-pill {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 10px 8px; text-align: center;
    cursor: pointer; transition: border-color .15s, transform .15s;
  }
  .info-pill:hover { border-color: var(--pink-mid); transform: translateY(-2px); }
  .info-pill .label { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--pink-deep); text-transform: uppercase; margin-bottom: 4px; }
  .info-pill .value { font-size: 18px; font-weight: 900; color: var(--text); }
  .info-pill.car .value { color: var(--pink-deep); }
  .no-result { text-align: center; color: var(--text-muted); font-size: 14px; padding: 20px 0; }

  /* 로그아웃 */
  .logout-btn {
    display: block; margin-top: 16px;
    background: none; border: 1.5px solid var(--border);
    border-radius: 10px; padding: 10px;
    width: 100%; color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; cursor: pointer; transition: all .2s;
  }
  .logout-btn:hover { border-color: var(--pink-mid); color: var(--pink-deep); }

  /* 하단 */
  .footer-deco {
    text-align: center; margin-top: 20px;
    font-size: 12px; color: rgba(196,96,122,.35); letter-spacing: 3px;
  }

  /* 브라우즈 패널 (상세 시트) */
  .browse-overlay {
    position: fixed; inset: 0;
    background: rgba(44,16,24,.4); backdrop-filter: blur(4px);
    z-index: 100;
    display: flex; align-items: flex-end; justify-content: center;
    padding: 0 16px 24px;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .browse-sheet {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 22px 18px;
    width: 100%; max-width: 420px;
    max-height: 75vh; overflow-y: auto;
    animation: slideUp .25s cubic-bezier(.175,.885,.32,1.275);
  }
  @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }

  .sheet-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .sheet-back {
    background: none; border: none; color: var(--pink-deep);
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
    font-weight: 700; cursor: pointer; padding: 0;
  }
  .sheet-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .sheet-close {
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 4px 10px;
    font-size: 13px; color: var(--text-muted);
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  }
  .sheet-close:hover { border-color: var(--pink-mid); color: var(--pink-deep); }

  /* 분류 목록 그리드 */
  .category-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .category-cell {
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 14px 8px; text-align: center;
    cursor: pointer; transition: all .2s;
  }
  .category-cell:hover { border-color: var(--pink-mid); transform: translateY(-2px); background: rgba(249,199,220,.1); }
  .category-cell .c-val { font-size: 18px; font-weight: 900; color: var(--pink-deep); }
  .category-cell .c-cnt { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  /* 인원 목록 */
  .member-list { display: flex; flex-direction: column; gap: 8px; }
  .member-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 10px 14px;
  }
  .member-row .m-name { font-size: 15px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .member-row .m-info { font-size: 11px; color: var(--text-muted); text-align: right; line-height: 1.6; }
</style>
</head>
<body>
<div class="dot-bg"></div>

<div class="wrap">
  <div class="site-header">
    <span class="site-title">Member Lookup</span>
    <div class="site-title-kr">2026 영어영문답사 참가자 조회</div>
    <div class="title-line"><span>✦</span></div>
  </div>

  <div class="card">

    <!-- 로그인 -->
    <div id="login-screen">
      <span class="lock-emoji" style="display:block;text-align:center;">🌸</span>
      <div class="card-title" style="text-align:center;">로그인</div>
      <div class="card-sub" style="text-align:center;">스태프 전용 페이지입니다</div>
      <div class="field">
        <label>아이디</label>
        <input type="text" id="inp-id" placeholder="아이디 입력" autocomplete="off"
          onkeydown="if(event.key==='Enter')document.getElementById('inp-pw').focus()">
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="inp-pw" placeholder="비밀번호 입력"
          onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="btn-main" onclick="login()">로그인</button>
      <div class="err-msg" id="login-err" style="text-align:center;"></div>
    </div>

    <!-- 메인 -->
    <div id="main-screen">

      <!-- 검색창 -->
      <div class="search-wrap">
        <input type="text" id="search-inp" placeholder="🔍  이름 또는 학번 검색"
          oninput="onSearch()" onkeydown="if(event.key==='Enter')onSearch()">
      </div>

      <!-- 브라우즈 버튼 -->
      <div class="browse-btns" id="browse-btns">
        <div class="browse-btn" onclick="openBrowse('room')">
          <span class="icon">🚪</span>
          <div class="label">방호수</div>
          <div class="sub">객실별 조회</div>
        </div>
        <div class="browse-btn" onclick="openBrowse('group')">
          <span class="icon">👥</span>
          <div class="label">조</div>
          <div class="sub">조별 조회</div>
        </div>
        <div class="browse-btn" onclick="openBrowse('car')">
          <span class="icon">🚌</span>
          <div class="label">차량</div>
          <div class="sub">호차별 조회</div>
        </div>
      </div>

      <div class="divider">검색 결과</div>
      <div id="result-area"></div>

      <button class="logout-btn" onclick="logout()">🔒 로그아웃</button>
    </div>

  </div>

function hash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;

}

  if (hash(id.toLowerCase()) !== ID_H || hash(pw) !== PW_H) {
    err.textContent = "❌ 아이디 또는 비밀번호가 틀렸습니다";
    err.classList.remove('shake'); void err.offsetWidth; err.classList.add('shake');
    document.getElementById('inp-pw').value = '';
    setTimeout(() => err.textContent = '', 2500);
    return;
  }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  setTimeout(() => document.getElementById('search-inp').focus(), 100);
}

function logout() {
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'block';
  document.getElementById('inp-id').value = '';
  document.getElementById('inp-pw').value = '';
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('search-inp').value = '';
}

// ── 검색 ──
function onSearch() {
  const q = document.getElementById('search-inp').value.trim();
  const area = document.getElementById('result-area');
  if (!q) { area.innerHTML = ''; return; }
  const results = STUDENTS.filter(s => s.name.includes(q) || s.id.includes(q));
  if (!results.length) {
    area.innerHTML = '<div class="no-result">🔍 검색 결과가 없어요</div>'; return;
  }
  area.innerHTML = results.map(s => `
    <div class="result-card">
      <div class="result-name">
        ${s.name}${STAFF.has(s.name) ? ' <span class="staff-badge">(STAFF)</span>' : ''}
        <span class="student-id">${s.id}</span>
      </div>
      <div class="result-grid">
        <div class="info-pill" onclick="showMembers('room','${s.room}')">
          <div class="label">방번호</div><div class="value">${s.room||'-'}</div>
        </div>
        <div class="info-pill" onclick="showMembers('group','${s.group}')">
          <div class="label">조</div><div class="value">${s.group||'-'}</div>
        </div>
        <div class="info-pill car" onclick="showMembers('car','${s.group?getCar(s.group):""}')">
          <div class="label">차량</div><div class="value">${s.group?getCar(s.group):'-'}</div>
        </div>
      </div>
    </div>
  `).join('');
}

// ── 브라우즈 ──
function openBrowse(type) {
  const overlay = document.createElement('div');
  overlay.className = 'browse-overlay';
  overlay.id = 'browse-overlay';

  const titles = { room:'🚪 방호수', group:'👥 조', car:'🚌 차량' };

  // 카테고리 목록 만들기
  let categories = {};
  STUDENTS.forEach(s => {
    let key = type === 'car' ? (s.group ? getCar(s.group) : '') : (type === 'room' ? s.room : s.group);
    if (!key) return;
    if (!categories[key]) categories[key] = 0;
    categories[key]++;
  });

  // 정렬
  let keys = Object.keys(categories);
  if (type === 'room') keys.sort((a,b) => parseInt(a)-parseInt(b));
  else if (type === 'group') keys.sort((a,b) => parseInt(a)-parseInt(b));
  else keys.sort();

  const cells = keys.map(k => `
    <div class="category-cell" onclick="showMembers('${type}','${k}')">
      <div class="c-val">${k}</div>
      <div class="c-cnt">${categories[k]}명</div>
    </div>
  `).join('');

  overlay.innerHTML = `
    <div class="browse-sheet">
      <div class="sheet-header">
        <div class="sheet-title">${titles[type]}</div>
        <button class="sheet-close" onclick="closeBrowse()">닫기</button>
      </div>
      <div class="category-grid">${cells}</div>
    </div>
  `;
  overlay.addEventListener('click', e => { if(e.target===overlay) closeBrowse(); });
  document.body.appendChild(overlay);
}

function closeBrowse() {
  const el = document.getElementById('browse-overlay');
  if (el) el.remove();
}

function showMembers(type, value) {
  if (!value || value==='-') return;
  closeBrowse();

  let members, title;
  if (type==='room') { members = STUDENTS.filter(s=>s.room===value); title=`🚪 ${value} 룸메이트`; }
  else if (type==='group') { members = STUDENTS.filter(s=>s.group===value); title=`👥 ${value} 전체`; }
  else { members = STUDENTS.filter(s=>s.group&&getCar(s.group)===value); title=`🚌 ${value} 탑승 인원`; }

  const overlay = document.createElement('div');
  overlay.className = 'browse-overlay';
  overlay.id = 'browse-overlay';

  const rows = members.map(s => `
    <div class="member-row">
      <div class="m-name">${s.name}${STAFF.has(s.name)?'<span class="staff-badge">(STAFF)</span>':''}</div>
      <div class="m-info">${s.room||'-'}<br>${s.group||'-'} · ${s.group?getCar(s.group):'-'}</div>
    </div>
  `).join('');

  overlay.innerHTML = `
    <div class="browse-sheet">
      <div class="sheet-header">
        <div class="sheet-title">${title} <span style="font-size:13px;color:var(--text-muted);font-weight:400">(${members.length}명)</span></div>
        <button class="sheet-close" onclick="closeBrowse()">닫기</button>
      </div>
      <div class="member-list">${rows}</div>
    </div>
  `;
  overlay.addEventListener('click', e => { if(e.target===overlay) closeBrowse(); });
  document.body.appendChild(overlay);
}

document.getElementById('inp-id').focus();
</script>
</body>
</html>
