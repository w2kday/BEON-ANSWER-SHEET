<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:      #f9c7dc;
    --pink-mid:  #f0a0c0;
    --pink-deep: #c4607a;
    --pink-dark: #7a2e45;
    --bg:        #fef6f9;
    --surface:   #ffffff;
    --text:      #2c1018;
    --text-muted:#9a6475;
    --border:    rgba(249,199,220,0.6);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    width: 480px; height: 480px;
    background: radial-gradient(circle, rgba(249,199,220,.35) 0%, transparent 70%);
    top: -120px; right: -120px;
    border-radius: 50%;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(249,199,220,.25) 0%, transparent 70%);
    bottom: -80px; left: -80px;
    border-radius: 50%;
    pointer-events: none;
  }
  .dot-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: radial-gradient(circle, rgba(249,199,220,.4) 1px, transparent 1px);
    background-size: 28px 28px;
  }
  .wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px;
  }

  /* 헤더 */
  .site-header { text-align: center; margin-bottom: 24px; }
  .site-title {
    font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
    color: var(--pink-deep); font-weight: 300; display: block; margin-bottom: 8px;
  }
  .site-title-kr { font-size: 22px; font-weight: 700; color: var(--text); }
  .title-line {
    display: flex; align-items: center; gap: 12px;
    justify-content: center; margin-top: 12px;
  }
  .title-line::before, .title-line::after {
    content: ''; flex: 1; height: 1px;
  }
  .title-line::before { background: linear-gradient(to right, transparent, var(--pink-mid)); }
  .title-line::after  { background: linear-gradient(to left,  transparent, var(--pink-mid)); }
  .title-line span { font-size: 14px; }

  /* 카드 */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    box-shadow: 0 4px 28px rgba(249,100,140,.07);
  }

  /* 로그인 */
  #login-screen { text-align: center; }
  .lock-emoji {
    font-size: 44px; display: block; margin-bottom: 16px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .card-title {
    font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px;
  }
  .card-sub {
    font-size: 13px; color: var(--text-muted); font-weight: 300; margin-bottom: 28px;
  }
  .field { margin-bottom: 12px; text-align: left; }
  .field label {
    display: block; font-size: 11px; font-weight: 700;
    color: var(--pink-deep); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .field input {
    width: 100%; padding: 13px 16px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus {
    border-color: var(--pink-mid);
    box-shadow: 0 0 0 4px rgba(249,199,220,.3);
  }
  .btn-main {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--pink), var(--pink-mid));
    color: var(--pink-dark);
    border: none; border-radius: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 6px;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 4px 16px rgba(240,160,192,.35);
  }
  .btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(240,160,192,.45); }
  .err-msg {
    font-size: 13px; color: #c0506a; min-height: 20px; margin-top: 10px;
    text-align: center;
  }
  .err-msg.shake { animation: shake .35s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-8px); }
    40%,80% { transform: translateX(8px); }
  }

  /* 검색 화면 */
  #search-screen { display: none; }

  .search-box {
    display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px;
  }
  .search-box input {
    width: 100%; padding: 13px 16px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .search-box input:focus {
    border-color: var(--pink-mid);
    box-shadow: 0 0 0 4px rgba(249,199,220,.3);
  }
  .btn-search {
    width: 100%;
    padding: 13px 18px;
    background: linear-gradient(135deg, var(--pink), var(--pink-mid));
    color: var(--pink-dark);
    border: none; border-radius: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    transition: transform .2s;
  }
  .btn-search:hover { transform: translateY(-1px); }

  /* 결과 카드 */
  #result-area { min-height: 40px; }

  .result-card {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    margin-bottom: 10px;
    animation: popIn .3s cubic-bezier(.175,.885,.32,1.275);
  }
  @keyframes popIn {
    from { opacity: 0; transform: translateY(8px) scale(.97); }
    to   { opacity: 1; transform: translateY(0)   scale(1); }
  }
  .result-name {
    font-size: 17px; font-weight: 700; color: var(--text);
    margin-bottom: 12px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .result-name .student-id {
    font-size: 12px; font-weight: 400; color: var(--text-muted); margin-left: auto;
  }
  .staff-badge {
    font-size: 11px; font-weight: 700;
    color: var(--pink-deep);
    background: rgba(249,199,220,.4);
    border: 1px solid var(--pink-mid);
    border-radius: 6px;
    padding: 1px 6px;
    letter-spacing: 0.5px;
  }
  .result-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .info-pill {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }
  .info-pill .label {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    color: var(--pink-deep); text-transform: uppercase; margin-bottom: 4px;
  }
  .info-pill .value {
    font-size: 18px; font-weight: 900; color: var(--text);
  }
  .info-pill.car .value { color: var(--pink-deep); }

  .no-result {
    text-align: center; color: var(--text-muted);
    font-size: 14px; padding: 24px 0;
  }

  .logout-btn {
    display: block; margin-top: 16px;
    background: none; border: 1.5px solid var(--border);
    border-radius: 10px; padding: 10px;
    width: 100%; color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; cursor: pointer;
    transition: all .2s;
  }
  .logout-btn:hover { border-color: var(--pink-mid); color: var(--pink-deep); }

  .footer-deco {
    text-align: center; margin-top: 20px;
    font-size: 12px; color: rgba(196,96,122,.35); letter-spacing: 3px;
  }
</style>

</div>

// 호차 계산
function getCar(group) {
  const n = parseInt(group);
  if (n >= 1 && n <= 4) return "1호차";
  if (n >= 5 && n <= 7) return "2호차";
  if (n >= 8 && n <= 10) return "3호차";
  return "-";
}

// 로그인 해시
function hash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return (h >>> 0).toString(16);
}
const ID_H = "2e1562";   // beon
const PW_H = "169004";   // 0125

function login() {
  const id = document.getElementById('inp-id').value.trim();
  const pw = document.getElementById('inp-pw').value;
  const err = document.getElementById('login-err');

  if (hash(id.toLowerCase()) !== ID_H || hash(pw) !== PW_H) {
    err.textContent = "❌ 아이디 또는 비밀번호가 틀렸습니다";
    err.classList.remove('shake');
    void err.offsetWidth;
    err.classList.add('shake');
    document.getElementById('inp-pw').value = '';
    setTimeout(() => err.textContent = '', 2500);
    return;
  }

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('search-screen').style.display = 'block';
  setTimeout(() => document.getElementById('search-inp').focus(), 100);
}

function logout() {
  document.getElementById('search-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'block';
  document.getElementById('inp-id').value = '';
  document.getElementById('inp-pw').value = '';
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('search-inp').value = '';
}

function search() {
  const q = document.getElementById('search-inp').value.trim();
  const area = document.getElementById('result-area');

  if (!q) { area.innerHTML = ''; return; }

  // 이름 또는 학번으로 검색
  const results = STUDENTS.filter(s =>
    s.name.includes(q) || s.id.includes(q)

  if (results.length === 0) {
    area.innerHTML = `<div class="no-result">🔍 검색 결과가 없어요</div>`;
    return;
  }

  area.innerHTML = results.map(s => `
    <div class="result-card">
      <div class="result-name">
        ${s.name}${STAFF.has(s.name) ? ' <span class="staff-badge">(STAFF)</span>' : ''}
        <span class="student-id">${s.id}</span>
      </div>
      <div class="result-grid">
        <div class="info-pill">
          <div class="label">방번호</div>
          <div class="value">${s.room || '-'}</div>
        </div>
        <div class="info-pill">
          <div class="label">조</div>
          <div class="value">${s.group || '-'}</div>
        </div>
        <div class="info-pill car">
          <div class="label">차량</div>
          <div class="value">${s.group ? getCar(s.group) : '-'}</div>
        </div>
      </div>
    </div>
  `).join('');
}

document.getElementById('inp-id').focus();
</script>
</body>
</html>
