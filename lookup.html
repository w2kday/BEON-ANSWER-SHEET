<title>영어영문답사 명단 조회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:      #f9c7dc;
    --pink-mid:  #f0a0c0;
    --pink-deep: #c4607a;
    --pink-dark: #7a2e45;
    --bg:        #fef6f9;
    --surface:   #ffffff;
    --text:      #2c1018;
    --text-muted:#9a6475;
    --border:    rgba(249,199,220,0.6);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    margin: 0;
    padding: 40px 16px 30px;
    position: relative; overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .wrap { flex: 0 0 auto; }
  .page-footer {
    flex: 0 0 auto;
    margin-top: auto;
    padding-top: 40px;
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  body::before {
    content: ''; position: fixed;
    width: 480px; height: 480px;
    background: radial-gradient(circle, rgba(249,199,220,.35) 0%, transparent 70%);
    top: -120px; right: -120px; border-radius: 50%; pointer-events: none;
  }
  body::after {
    content: ''; position: fixed;
    width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(249,199,220,.25) 0%, transparent 70%);
    bottom: -80px; left: -80px; border-radius: 50%; pointer-events: none;
  }
  .dot-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: radial-gradient(circle, rgba(249,199,220,.4) 1px, transparent 1px);
    background-size: 28px 28px;
  }
  .wrap { position: relative; z-index: 1; width: 100%; max-width: 420px; min-height: calc(100vh - 80px); display: flex; flex-direction: column; }

  /* 헤더 */
  .site-header { text-align: center; margin-bottom: 24px; }
  .site-title {
    font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
    color: var(--pink-deep); font-weight: 300; display: block; margin-bottom: 8px;
  }
  .site-title-kr { font-size: 22px; font-weight: 700; color: var(--text); }
  .title-line {
    display: flex; align-items: center; gap: 12px;
    justify-content: center; margin-top: 12px;
  }
  .title-line::before { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--pink-mid)); }
  .title-line::after  { content: ''; flex: 1; height: 1px; background: linear-gradient(to left,  transparent, var(--pink-mid)); }
  .title-line span { font-size: 14px; }

  /* 카드 */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 28px 22px;
    box-shadow: 0 4px 28px rgba(249,100,140,.07);
  }

  /* 공통 인풋 */
  .field { margin-bottom: 12px; }
  .field label {
    display: block; font-size: 11px; font-weight: 700;
    color: var(--pink-deep); letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .field input {
    width: 100%; padding: 13px 16px;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif; outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus {
    border-color: var(--pink-mid);
    box-shadow: 0 0 0 4px rgba(249,199,220,.3);
  }

  /* 버튼 */
  .btn-main {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--pink), var(--pink-mid));
    color: var(--pink-dark); border: none; border-radius: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 4px 16px rgba(240,160,192,.35);
  }
  .btn-main:hover { transform: translateY(-2px); }

  .err-msg { font-size: 13px; color: #c0506a; min-height: 20px; margin-top: 10px; text-align: center; }
  .err-msg.shake { animation: shake .35s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }

  /* 로그인 */
  #login-screen { text-align: left; }
  .lock-emoji {
    font-size: 44px; display: block; margin-bottom: 16px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .card-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .card-sub { font-size: 13px; color: var(--text-muted); font-weight: 300; margin-bottom: 24px; }

  /* 메인 화면 */
  #main-screen { display: none; }

  #login-screen, #main-screen {
    transition: opacity .35s ease, transform .35s ease;
  }
  .fade-out {
    opacity: 0 !important;
    transform: translateY(-8px) !important;
    pointer-events: none;
  }
  .fade-in {
    animation: fadeInUp .4s ease forwards;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 검색창 */
  .search-wrap { margin-bottom: 20px; }
  .search-wrap input {
    width: 100%; padding: 15px 18px;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif; outline: none;
    transition: all .3s ease;
  }
  .search-wrap input:focus {
    border: 2px solid var(--pink-mid);
    box-shadow: 0 0 0 4px rgba(249,100,140,0.1), 0 4px 20px rgba(249,100,140,0.15);
    transform: translateY(-1px);
  }

  /* 브라우즈 버튼 3개 */
  .browse-btns {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin-bottom: 20px;
  }
  .browse-btn {
    padding: 16px 8px;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 12px; text-align: center;
    cursor: pointer; transition: all .2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .browse-btn:hover { border-color: var(--pink-mid); transform: translateY(-2px); background: rgba(249,199,220,.1); }
  .browse-btn .icon { font-size: 24px; display: block; margin-bottom: 8px; }
  .browse-btn .label { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .browse-btn .sub { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

  /* 구분선 */
  .divider {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; color: var(--text-muted); font-size: 11px;
    letter-spacing: 1px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* 검색 결과 */
  #result-area { min-height: 20px; }
  
  /* 검색 카운터 */
  .search-counter {
    padding: 10px 16px;
    margin-bottom: 14px;
    background: linear-gradient(135deg, var(--pink), var(--pink-mid));
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    color: var(--pink-dark);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 2px 8px rgba(249,100,140,0.2);
    animation: slideInDown 0.4s ease;
  }
  .search-counter::before {
    content: "🔍";
    font-size: 16px;
  }
  .search-counter .count {
    font-size: 19px;
    font-weight: 900;
    animation: countUp 0.5s ease;
  }
  @keyframes slideInDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes countUp {
    from { transform: scale(1.3); }
    to { transform: scale(1); }
  }
  
  /* ═══════════════════════════════════════════════════════════
     벚꽃잎 애니메이션 🌸
     ═══════════════════════════════════════════════════════════ */
  .sakura-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .sakura-container.active {
    opacity: 1;
  }
  .sakura {
    position: absolute;
    width: 10px;
    height: 10px;
    background: radial-gradient(circle at 30% 30%, #ffcce5, #ffb3d9, #ff8cc5);
    border-radius: 50% 0 50% 0;
    opacity: 0;
    animation: sakuraFall linear forwards;
  }
  /* 모바일에서는 작게 */
  @media (max-width: 900px) {
    .sakura {
      width: 8px;
      height: 8px;
    }
  }
  @keyframes sakuraFall {
    0% {
      opacity: 0;
      transform: translateY(-50px) translateX(0) rotate(0deg) scale(0);
    }
    5% {
      opacity: 1;
      transform: translateY(0) translateX(0) rotate(0deg) scale(1);
    }
    100% {
      opacity: 0;
      transform: translateY(100vh) translateX(var(--move-x, 50px)) rotate(1080deg) scale(0.5);
    }
  }
  
  /* 개선된 결과 카드 */
  .result-card {
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 16px;
    animation: popIn .3s cubic-bezier(.175,.885,.32,1.275);
    transition: all .3s cubic-bezier(.175,.885,.32,1.275);
  }
  .result-card:hover {
    border-color: var(--pink-mid);
    background: rgba(255, 255, 255, 0.9);
    transform: translateX(6px) scale(1.02);
    box-shadow: 0 8px 32px rgba(249,100,140,.18), 0 0 0 1px var(--pink-mid);
  }
  @keyframes popIn { from{opacity:0;transform:translateY(8px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
  
  /* 메인 정보 영역 */
  .result-main {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  
  /* 이름 섹션 */
  .name-section {
    min-width: 100px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .name-text {
    font-size: 18px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.2;
  }
  
  /* 스태프 뱃지 개선 */
  .staff-badge {
    font-size: 9px;
    font-weight: 900;
    color: #fff;
    background: linear-gradient(135deg, var(--pink-deep), var(--pink-dark));
    border-radius: 4px;
    padding: 2px 6px;
    letter-spacing: 0.5px;
    display: inline-block;
    box-shadow: 0 2px 6px rgba(122,46,69,.3);
  }
  
  /* 컴팩트 정보 뱃지들 */
  .info-compact {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .info-compact > span {
    display: inline-flex;
    align-items: center;
    justify-content: center; /* 가운데 정렬 */
    gap: 4px;
    padding: 6px 12px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    min-width: 85px; /* 10조 기준 통일 크기 */
    text-align: center;
  }
  .info-compact > span:hover {
    transform: translateY(-2px);
    border-color: var(--pink-mid);
    background: rgba(249,199,220,.2);
  }
  
  
  /* 학번 컴팩트 */
  .student-id-compact {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    padding: 6px 12px;
    background: rgba(249,199,220,.15);
    border-radius: 8px;
    white-space: nowrap;
  }
  
  .no-result { text-align: center; color: var(--text-muted); font-size: 14px; padding: 20px 0; }

  /* ─── 데스크탑: 더 효율적인 레이아웃 ─── */
  @media (min-width: 900px) {
    .result-card {
      padding: 12px 20px;
    }
    .name-section {
      min-width: 120px;
    }
    .name-text {
      font-size: 19px;
    }
    .info-compact {
      gap: 10px;
    }
    .student-id-compact {
      font-size: 13px;
    }
  }

  /* ════════════════════════════════════════════ */
  /* ══════════ MOBILE LAYOUT (<900px) ══════════ */
  /* ════════════════════════════════════════════ */
  @media (max-width: 899px) {
    /* 툴바를 flex column으로 (검색 결과가 버튼 위로) */
    .toolbar {
      display: flex;
      flex-direction: column;
    }
    
    /* 검색 결과 영역 */
    .toolbar .split-layout {
      width: 100%;
      margin: 0 0 20px 0;
    }
    
    .toolbar .results-section {
      height: auto;
      max-height: 400px;
    }
    
    /* 결과 카드 세로 배치 */
    .result-card {
      padding: 14px 16px;
      gap: 10px;
      flex-direction: column;
      align-items: stretch;
    }
    
    /* 카드 내부 조정 */
    .result-main {
      gap: 10px;
      flex-direction: column;
      width: 100%;
    }
    
    .name-section {
      min-width: 0;
      width: 100%;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .name-text {
      font-size: 17px;
      font-weight: 900;
    }
    
    .staff-badge {
      font-size: 9px;
      padding: 2px 6px;
    }
    
    /* 배지를 세로로 한 줄씩 배치 */
    .info-compact {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }
    
    .info-compact > span {
      width: 100%;
      min-width: 0;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      box-sizing: border-box;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .student-id-compact {
      font-size: 12px;
      padding: 6px 10px;
      width: fit-content;
      align-self: flex-end;
      white-space: nowrap;
    }
  }

  /* 로그아웃 */
  .logout-btn {
    display: block; margin-top: 16px;
    background: none; border: 1.5px solid var(--border);
    border-radius: 10px; padding: 10px;
    width: 100%; color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; cursor: pointer; transition: all .2s;
  }
  .logout-btn:hover { border-color: var(--pink-mid); color: var(--pink-deep); }

  /* 브라우즈 패널 (상세 시트) */
  .browse-overlay {
    position: fixed; inset: 0;
    background: rgba(44,16,24,.4); backdrop-filter: blur(4px);
    z-index: 100;
    display: flex; align-items: flex-end; justify-content: center;
    padding: 0 16px 24px;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .browse-sheet {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 22px 18px;
    width: 100%; max-width: 420px;
    max-height: 75vh; overflow-y: auto;
    animation: slideUp .25s cubic-bezier(.175,.885,.32,1.275);
  }
  @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }

  .sheet-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .sheet-back {
    background: none; border: none; color: var(--pink-deep);
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
    font-weight: 700; cursor: pointer; padding: 0;
  }
  .sheet-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .sheet-close {
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 4px 10px;
    font-size: 13px; color: var(--text-muted);
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  }
  .sheet-close:hover { border-color: var(--pink-mid); color: var(--pink-deep); }

  /* 분류 목록 그리드 */
  .category-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .category-cell {
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 14px 8px; text-align: center;
    cursor: pointer; transition: all .2s;
  }
  .category-cell:hover { border-color: var(--pink-mid); transform: translateY(-2px); background: rgba(249,199,220,.1); }
  .category-cell .c-val { font-size: 18px; font-weight: 900; color: var(--pink-deep); }
  .category-cell .c-cnt { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  /* 인원 목록 */
  .member-list { display: flex; flex-direction: column; gap: 8px; }
  .member-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 10px 14px;
  }
  .member-row .m-name { font-size: 15px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .member-row .m-info { font-size: 11px; color: var(--text-muted); text-align: right; line-height: 1.6; }
  
  /* 개선된 인원 목록 */
  .member-row-improved {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    transition: all .2s;
  }
  .member-row-improved:hover {
    border-color: var(--pink-mid);
    background: rgba(255, 255, 255, 0.9);
    transform: translateX(4px);
  }
  .member-name-section {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .member-name {
    font-size: 16px;
    font-weight: 900;
    color: var(--text);
  }
  .member-badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .mini-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 8px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    white-space: nowrap;
    min-width: 70px; /* 크기 통일 */
    text-align: center;
  }
  .mini-badge.car-1 { 
    border-color: rgba(255, 107, 107, 0.5);
    color: #ff6b6b;
    background: rgba(255, 107, 107, 0.08);
  }
  .mini-badge.car-2 { 
    border-color: rgba(51, 217, 178, 0.5);
    color: #33d9b2;
    background: rgba(51, 217, 178, 0.08);
  }
  .mini-badge.car-3 { 
    border-color: rgba(87, 101, 242, 0.5);
    color: #5765f2;
    background: rgba(87, 101, 242, 0.08);
  }

  .footer-deco {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: rgba(196,96,122,.35);
    letter-spacing: 3px;

  /* ─── 모바일/데스크탑 표시 토글 ─── */
  .desktop-only { display: none; }
  /* (.mobile-only는 데스크탑 미디어쿼리에서 숨김) */

  /* ════════════════════════════════════════════ */
  /* ══════════ DESKTOP LAYOUT (≥900px) ═════════ */
  /* ════════════════════════════════════════════ */
  @media (min-width: 900px) {
    body {
      padding: 60px 32px 40px;
    }

    .wrap {
      max-width: 1080px;
    }

    /* 헤더 */
    .site-header {
      margin-bottom: 32px;
    }
    .site-title {
      font-size: 12px;
      letter-spacing: 6px;
    }
    .site-title-kr {
      font-size: 28px;
    }

    /* 카드: 데스크탑에서는 더 넓게 */
    .card {
      padding: 32px 36px;
    }

    /* 로그인 화면은 좁게 유지 */
    #login-screen {
      max-width: 380px;
      margin: 0 auto;
      padding: 20px 0;
    }

    /* ─── 메인: 가로 툴바 + 2단 분할 ─── */
    /* (#main-screen은 JS로 display:block 됨 — 추가 처리 불필요) */

    /* 툴바: 검색창 + 버튼 가로 배치 */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(249,100,140,.06);
      position: sticky;
      top: 16px;
      z-index: 50;
      margin-bottom: 24px; /* 툴바 하단 간격 추가 */
    }
    .toolbar .search-wrap {
      flex: 1;
      margin-bottom: 0;
    }
    .toolbar .search-wrap input {
      padding: 12px 18px;
      background: var(--bg);
      border-radius: 10px;
      font-size: 14px;
    }
    .toolbar .browse-btns {
      display: flex;
      flex-direction: row;
      gap: 8px;
      margin-bottom: 0;
      grid-template-columns: none;
      align-items: center;
    }
    .toolbar .browse-btn {
      width: 60px;
      padding: 12px 4px;
      flex-direction: column;
      gap: 4px;
      background: var(--bg);
      border-radius: 10px;
      border: 1.5px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .toolbar .browse-btn:hover {
      border-color: var(--pink-mid);
      background: rgba(249,199,220,.18);
    }
    .toolbar .browse-btn .icon {
      font-size: 20px;
      margin-bottom: 0;
      line-height: 1;
    }
    .toolbar .browse-btn .label {
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
    }
    .toolbar .browse-btn .sub { display: none; }

    /* 메뉴얼 버튼은 가로 풀림 */
    .toolbar .browse-btn[onclick*="openManual"] {
      grid-column: auto;
    }

    /* 툴바 안 로그아웃 */
    .toolbar .logout-inline {
      width: 42px;
      height: 42px;
      padding: 0;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .toolbar .logout-inline:hover {
      border-color: var(--pink-mid);
      color: var(--pink-deep);
      background: rgba(249,199,220,.18);
    }

    /* 모바일 전용 요소 숨김 */
    .mobile-only { display: none !important; }
    .desktop-only { display: block; }
    button.desktop-only, .stats-panel.desktop-only { display: block; }
    aside.desktop-only { display: block; }

    /* ─── 분할 레이아웃 ─── */
    .split-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 28px;
      align-items: start;
    }

    /* 왼쪽: 통계 패널 */
    .stats-panel {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 24px 22px;
      position: sticky;
      top: 90px;
      height: 350px !important; /* 오른쪽 박스와 동일한 높이 - 강제 적용 */
      overflow: hidden; /* 넘치는 내용 숨김 */
      display: flex;
      flex-direction: column;
    }
    .stats-panel h3 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--pink-deep);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px dashed var(--border);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 900;
      color: var(--pink-deep);
    }

    /* 오른쪽: 결과 영역 - 완전 고정 높이 + 스크롤 */
    .results-section {
      height: 350px; /* 로고까지 보이도록 낮춤 */
      overflow-y: auto;
      padding-right: 4px; /* 스크롤바 공간 */
    }
    
    /* 스크롤바 스타일링 */
    .results-section::-webkit-scrollbar {
      width: 8px;
    }
    .results-section::-webkit-scrollbar-track {
      background: rgba(249,199,220,.15);
      border-radius: 10px;
    }
    .results-section::-webkit-scrollbar-thumb {
      background: var(--pink-mid);
      border-radius: 10px;
    }
    .results-section::-webkit-scrollbar-thumb:hover {
      background: var(--pink-deep);
    }

    /* divider 숨김 */
    #main-screen .divider { display: none; }

    /* 로그아웃 버튼은 툴바로 이동했으니 숨김 */
    #main-screen > .logout-btn { display: none; }

    /* 검색해보세요 빈 상태 */
    .empty-state {
      text-align: center;
      padding: 40px 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(249,199,220,0.1));
      backdrop-filter: blur(12px);
      border: 2px dashed var(--pink);
      border-radius: 20px;
      margin: 20px 0;
    }
    .empty-state .emoji {
      font-size: 48px;
      margin-bottom: 12px;
      display: block;
      opacity: 0.8;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    .empty-state .title {
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .empty-state .desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* 데스크탑 검색 결과 카드 - 한 줄에 하나씩 */
    #result-area:not(:empty) {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }
    .result-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(249,199,220,0.05));
      backdrop-filter: blur(16px);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      transition: all .3s cubic-bezier(.175,.885,.32,1.275);
      display: flex;
      flex-direction: row; /* 가로 배치 */
      align-items: center;
      gap: 20px;
    }
    .result-card:hover {
      transform: translateX(6px) scale(1.01);
      border-color: var(--pink-mid);
      background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(249,199,220,0.1));
      box-shadow: 0 8px 32px rgba(249,100,140,.18), 0 0 0 1px var(--pink-mid);
    }
    
    /* 카드 내부 - 가로 배치 */
    .result-main {
      flex: 1;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 24px;
    }
    .name-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 100px;
    }
    .name-text {
      font-size: 19px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    
    /* 배지들 가로 배치 */
    .info-compact {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      flex: 1;
    }
    .info-compact > span {
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 10px;
      transition: all .2s;
      white-space: nowrap;
    }
    .info-compact > span:hover {
      transform: translateY(-2px) scale(1.05);
    }
    
    .student-id-compact {
      font-size: 13px;
      font-weight: 500;
      padding: 8px 14px;
      background: rgba(249,199,220,.2);
      border-radius: 10px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* 상세 패널 가운데 정렬 (모달처럼) */
    .browse-overlay {
      align-items: center;
      padding: 20px;
    }
    .browse-sheet {
      max-width: 480px;
      animation: scaleIn .25s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes scaleIn {
      from { transform: scale(.92); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  }

  /* 큰 화면 (1200px+): 결과 3열 */
  @media (min-width: 1200px) {
    #result-area:not(:empty) {
      grid-template-columns: repeat(3, 1fr);
    }
  }

</style>
</head>
<body>
<div class="dot-bg"></div>

<div class="wrap">
  <div class="site-header">
    <span class="site-title">Member Lookup</span>
    <div class="site-title-kr">영어영문답사</div>
    <div class="title-line"><span>✦</span></div>
  </div>

  <div class="card">

    <!-- 로그인 -->
    <div id="login-screen">
      <span class="lock-emoji" style="display:block;text-align:center;">🌸</span>
      <div class="card-title" style="text-align:center;">로그인</div>
      <div class="card-sub" style="text-align:center;">스태프 전용 페이지입니다</div>
      <div class="field">
        <label>아이디</label>
        <input type="text" id="inp-id" placeholder="아이디 입력" autocomplete="off"
          onkeydown="if(event.key==='Enter')document.getElementById('inp-pw').focus()">
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="inp-pw" placeholder="비밀번호 입력"
          onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="btn-main" onclick="login()">로그인</button>
      <div class="err-msg" id="login-err" style="text-align:center;"></div>
      
      <div style="margin-top:20px;padding:14px;background:rgba(249,199,220,0.15);border-radius:12px;border:1px solid var(--border);">
        <div style="font-size:11px;color:var(--text-muted);line-height:1.7;text-align:center;">
          학우분들의 정보는 AES-GCM으로 암호화되어 있습니다.
        </div>
      </div>
    </div>

    <!-- 메인 -->
    <div id="main-screen">

      <!-- 툴바 (모바일: 세로 / 데스크탑: 가로) -->
      <div class="toolbar">
        <div class="search-wrap">
          <input type="text" id="search-inp" placeholder="🔍  이름 또는 학번 검색"
            oninput="onSearch()" onkeydown="if(event.key==='Enter')onSearch()">
        </div>

        <div class="browse-btns" id="browse-btns">
          <div class="browse-btn" onclick="openBrowse('room')">
            <span class="icon">🚪</span>
            <div class="label">방호수</div>
            <div class="sub">객실별 조회</div>
          </div>
          <div class="browse-btn" onclick="openBrowse('group')">
            <span class="icon">👥</span>
            <div class="label">조</div>
            <div class="sub">조별 조회</div>
          </div>
          <div class="browse-btn" onclick="openBrowse('car')">
            <span class="icon">🚌</span>
            <div class="label">차량</div>
            <div class="sub">호차별 조회</div>
          </div>
          <div class="browse-btn" onclick="openManual()" style="grid-column: 1 / -1;">
            <span class="icon">📋</span>
            <div class="label">메뉴얼</div>
            <div class="sub">스태프 운영 가이드</div>
          </div>
        </div>

        <button class="logout-inline desktop-only" onclick="logout()" title="로그아웃">🔒</button>
      </div>

      <!-- 분할 레이아웃 -->
      <div class="split-layout">
        <!-- 데스크탑 전용: 통계 패널 -->
        <aside class="stats-panel desktop-only" id="stats-panel">
          <h3>✦ 한눈에 보기</h3>
          <div class="stat-row">
            <span class="stat-label">총 인원</span>
            <span class="stat-value" id="stat-total">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">조</span>
            <span class="stat-value" id="stat-groups">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">방</span>
            <span class="stat-value" id="stat-rooms">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">스태프</span>
            <span class="stat-value" id="stat-staff">—</span>
          </div>
        </aside>

        <section class="results-section">
          <div class="divider mobile-only">검색 결과</div>
          <div id="result-area"></div>
          <!-- 데스크탑 빈 상태 -->
          <div class="empty-state desktop-only" id="empty-state">
            <span class="emoji">🔎</span>
            <div class="title">검색하거나 카테고리를 선택하세요</div>
            <div class="desc">위 검색창에 이름·학번을 입력하거나<br>방호수·조·차량 버튼을 눌러보세요</div>
          </div>
        </section>
      </div>

      <button class="logout-btn mobile-only" onclick="logout()">🔒 로그아웃</button>
    </div>

  </div>

</div>

</div>

<div class="page-footer">
  <div class="footer-deco">✦ &nbsp; ✦ &nbsp; ✦</div>
  <div class="logo-footer"></div>
</div>

<!-- 비밀번호 변경 모달 -->
<div id="password-change-modal" class="browse-overlay" style="display:none;">
  <div class="browse-sheet" style="max-width: 500px;">
    <div class="sheet-header">
      <div class="sheet-title">🔑 비밀번호 변경</div>
      <button class="sheet-close" onclick="closePasswordModal()">닫기</button>
    </div>
    <div style="padding: 20px;">
      <div style="margin-bottom: 16px;">
        <label style="display:block; margin-bottom:8px; font-size:13px; font-weight:600; color:var(--pink-deep);">현재 비밀번호</label>
        <input type="password" id="current-password" placeholder="현재 비밀번호 입력" 
          style="width:100%; padding:12px; border:1.5px solid var(--border); border-radius:8px; font-size:14px;">
      </div>
      <div style="margin-bottom: 16px;">
        <label style="display:block; margin-bottom:8px; font-size:13px; font-weight:600; color:var(--pink-deep);">새 비밀번호</label>
        <input type="password" id="new-password" placeholder="새 비밀번호 입력" 
          style="width:100%; padding:12px; border:1.5px solid var(--border); border-radius:8px; font-size:14px;">
      </div>
      <div style="margin-bottom: 20px;">
        <label style="display:block; margin-bottom:8px; font-size:13px; font-weight:600; color:var(--pink-deep);">새 비밀번호 확인</label>
        <input type="password" id="new-password-confirm" placeholder="새 비밀번호 다시 입력" 
          style="width:100%; padding:12px; border:1.5px solid var(--border); border-radius:8px; font-size:14px;">
      </div>
      <button onclick="executePasswordChange()" 
        style="width:100%; padding:14px; background:linear-gradient(135deg, var(--pink-deep), var(--pink-dark)); color:white; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer;">
        비밀번호 변경 및 다운로드
      </button>
      <p style="margin-top:12px; font-size:11px; color:var(--text-muted); line-height:1.6;">
        ⚠️ 새 비밀번호로 암호화된 HTML 파일이 다운로드됩니다. 기존 파일을 새 파일로 교체하세요.
      </p>
    </div>
  </div>
</div>

function getStats() {
  const stats = localStorage.getItem('lookup_stats');
  if (!stats) {
    return {
      totalSearches: 0,
      searchKeywords: {},
      browseClicks: { room: 0, group: 0, car: 0, manual: 0 },
      totalLogins: 0,
      firstLogin: null,
      lastLogin: null
    };
  }
  return JSON.parse(stats);
}

function saveStats(stats) {
  localStorage.setItem('lookup_stats', JSON.stringify(stats));
}

function trackSearch(keyword) {
  const stats = getStats();
  stats.totalSearches++;
  
  // 검색어 기록 (빈 문자열 제외)
  if (keyword && keyword.trim()) {
    const key = keyword.trim();
    stats.searchKeywords[key] = (stats.searchKeywords[key] || 0) + 1;
  }
  
  saveStats(stats);
}

function trackBrowse(type) {
  const stats = getStats();
  stats.browseClicks[type]++;
  saveStats(stats);
}

function trackLogin() {
  const stats = getStats();
  stats.totalLogins++;
  const now = new Date().toISOString();
  if (!stats.firstLogin) stats.firstLogin = now;
  stats.lastLogin = now;
  saveStats(stats);
}

let SESSION_ACTIVE = false;
let AUTO_BLUR_TIMER = null;

// Web Crypto API로 AES-256-GCM 복호화
async function decryptWithPassword(encData, password) {
  try {
    // salt는 평문 문자열이므로 TextEncoder로 직접 인코딩
    const salt = new TextEncoder().encode(encData.salt);
    const iv = Uint8Array.from(atob(encData.iv), c => c.charCodeAt(0));
    const data = Uint8Array.from(atob(encData.data), c => c.charCodeAt(0));
    const tag = Uint8Array.from(atob(encData.tag), c => c.charCodeAt(0));
    
    // PBKDF2로 키 유도
    const passwordKey = await crypto.subtle.importKey(
      'raw',
      new TextEncoder().encode(password),
      'PBKDF2',
      false,
      ['deriveKey']
    );
    
    const key = await crypto.subtle.deriveKey(
      {
        name: 'PBKDF2',
        salt: salt,
        iterations: 100000,
        hash: 'SHA-256'
      },
      passwordKey,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    
    // AES-GCM 복호화
    const ciphertext = new Uint8Array([...data, ...tag]);
    const plaintext = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: iv, tagLength: 128 },
      key,
      ciphertext
    );
    
    return JSON.parse(new TextDecoder().decode(plaintext));
  } catch(e) {
    console.error('복호화 실패:', e);
    return null;
  }
}

function getCar(group) {
  const n = parseInt(group);
  if (n >= 1 && n <= 4) return "1호차";
  if (n >= 5 && n <= 7) return "2호차";
  if (n >= 8 && n <= 10) return "3호차";
  return "-";
}

function hash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return (h >>> 0).toString(16);
}
const ID_H = "2e1562";
const PW_H = "169004";

async function login() {
  const id = document.getElementById('inp-id').value.trim();
  const pw = document.getElementById('inp-pw').value;
  const err = document.getElementById('login-err');
  
  if (hash(id.toLowerCase()) !== ID_H || hash(pw) !== PW_H) {
    err.textContent = "❌ 아이디 또는 비밀번호가 틀렸습니다";
    err.classList.remove('shake'); void err.offsetWidth; err.classList.add('shake');
    document.getElementById('inp-pw').value = '';
    setTimeout(() => err.textContent = '', 2500);
    return;
  }
  
  // 🔐 비밀번호로 데이터 복호화 (진짜 Web Crypto API)
  STUDENTS = await decryptWithPassword(ENC_STUDENTS, pw);
  STAFF = new Set(await decryptWithPassword(ENC_STAFF, pw));
  
  if (!STUDENTS || !STAFF) {
    alert('❌ 데이터 복호화 실패');
    return;
  }
  
  SESSION_ACTIVE = true;
  
  // 통계 기록
  trackLogin();
  
  // 벚꽃잎 애니메이션 시작
  createSakuraAnimation();
  
  const loginScreen = document.getElementById('login-screen');
  const mainScreen = document.getElementById('main-screen');

  loginScreen.classList.add('fade-out');
  setTimeout(() => {
    loginScreen.style.display = 'none';
    loginScreen.classList.remove('fade-out');
    mainScreen.style.display = 'block';
    mainScreen.classList.add('fade-in');
    setTimeout(() => {
      mainScreen.classList.remove('fade-in');
      document.getElementById('search-inp').focus();
    }, 400);
    populateStats();
  }, 350);
  
  // 자동 블러 시작
  resetAutoBlur();
}

// 로그아웃 + 메모리 삭제
function logout() {
  SESSION_ACTIVE = false;
  STUDENTS = [];
  STAFF = new Set();
  clearTimeout(AUTO_BLUR_TIMER);
  document.body.classList.remove('privacy-blur');
}

// 자동 블러 타이머 (30초)
function resetAutoBlur() {
  clearTimeout(AUTO_BLUR_TIMER);
  document.body.classList.remove('privacy-blur');
  
  if (SESSION_ACTIVE && window.innerWidth >= 900) {
    AUTO_BLUR_TIMER = setTimeout(() => {
      document.body.classList.add('privacy-blur');
    }, 30000);
  }
}

// 활동 재개
function resumeActivity() {
  document.body.classList.remove('privacy-blur');
  resetAutoBlur();
}

// 활동 감지
['mousedown', 'mousemove', 'keydown', 'scroll', 'touchstart'].forEach(event => {
  document.addEventListener(event, () => {
    if (SESSION_ACTIVE) resetAutoBlur();
  }, { passive: true });
});

// 개발자 도구 감지 및 자동 로그아웃 (데스크탑만)
setInterval(() => {
  // 모바일에서는 확대(줌) 때문에 오작동 → 데스크탑에서만 작동
  const isMobile = window.innerWidth < 900;
  if (isMobile) return; // 모바일에서는 비활성화
  
  const threshold = 200; // 더 여유있게 설정
  if ((window.outerWidth - window.innerWidth > threshold || 
       window.outerHeight - window.innerHeight > threshold) && SESSION_ACTIVE) {
    logout();
    alert('⚠️ 보안: 개발자 도구가 감지되어 자동 로그아웃 및 메모리 삭제되었습니다.');
  }
}, 1000);

function populateStats() {
  const total = STUDENTS.length;
  const groups = new Set(STUDENTS.map(s => s.group).filter(Boolean)).size;
  const rooms = new Set(STUDENTS.map(s => s.room).filter(Boolean)).size;
  const staffCount = STUDENTS.filter(s => STAFF.has(s.name)).length;
  const e = id => document.getElementById(id);
  if (e('stat-total')) e('stat-total').textContent = total;
  if (e('stat-groups')) e('stat-groups').textContent = groups;
  if (e('stat-rooms')) e('stat-rooms').textContent = rooms;
  if (e('stat-staff')) e('stat-staff').textContent = staffCount;
}

async function addStudent() {
  const name = document.getElementById('add-name').value.trim();
  const id = document.getElementById('add-id').value.trim();
  const group = document.getElementById('add-group').value.trim();
  const room = document.getElementById('add-room').value.trim();
  const isStaff = document.getElementById('add-staff').checked;
  
  if (!name || !id) {
    alert('이름과 학번은 필수입니다.');
    return;
  }
  
  // 학생 추가
  STUDENTS.push({ name, id, group, room });
  if (isStaff) STAFF.add(name);
  
  // 데이터 저장
  await saveStudentData();
}

async function editStudent(idx) {
  const oldName = STUDENTS[idx].name;
  const name = document.getElementById('edit-name').value.trim();
  const id = document.getElementById('edit-id').value.trim();
  const group = document.getElementById('edit-group').value.trim();
  const room = document.getElementById('edit-room').value.trim();
  const isStaff = document.getElementById('edit-staff').checked;
  
  if (!name || !id) {
    alert('이름과 학번은 필수입니다.');
    return;
  }
  
  // 학생 수정
  STUDENTS[idx] = { name, id, group, room };
  
  // 스태프 업데이트
  STAFF.delete(oldName);
  if (isStaff) STAFF.add(name);
  
  // 데이터 저장
  await saveStudentData();
}

async function deleteStudent(idx) {
  const student = STUDENTS[idx];
  if (!confirm(`${student.name}(${student.id})을(를) 삭제하시겠습니까?`)) {
    return;
  }
  
  // 학생 삭제
  STAFF.delete(student.name);
  STUDENTS.splice(idx, 1);
  
  // 데이터 저장
  await saveStudentData();
}

async function saveStudentData() {
  try {
    // 현재 비밀번호로 암호화
    const currentPassword = '0125'; // 현재 로그인 비밀번호
    
    const studentsJson = JSON.stringify(STUDENTS);
    const staffJson = JSON.stringify([...STAFF]);
    
    const newEncStudents = await encryptData(studentsJson, currentPassword);
    const newEncStaff = await encryptData(staffJson, currentPassword);
    
    // 현재 HTML 가져오기
    let htmlContent = document.documentElement.outerHTML;
    
    // 암호화 데이터 교체 (정규식 사용)
    const studentsRegex = /const ENC_STUDENTS = \{[^}]+\};/;
    const newStudentsLine = `const ENC_STUDENTS = ${JSON.stringify(newEncStudents)};`;
    htmlContent = htmlContent.replace(studentsRegex, newStudentsLine);
    
    const staffRegex = /const ENC_STAFF = \{[^}]+\};/;
    const newStaffLine = `const ENC_STAFF = ${JSON.stringify(newEncStaff)};`;
    htmlContent = htmlContent.replace(staffRegex, newStaffLine);
    
    // DOCTYPE 추가
    if (!htmlContent.startsWith('<!DOCTYPE')) {
      htmlContent = '<!DOCTYPE html>\n' + htmlContent;
    }
    
    // 새 HTML 파일 다운로드
    const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'lookup2_final_new.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    // 모든 오버레이 닫기
    document.querySelectorAll('.browse-overlay').forEach(el => el.remove());
    
    alert('✅ 변경사항이 저장된 새 파일이 다운로드되었습니다!\n\n기존 파일을 새 파일로 교체한 후 페이지를 새로고침하세요.');
    
  } catch (error) {
    console.error('저장 오류:', error);
    alert('❌ 저장 중 오류가 발생했습니다.\n\n오류 내용: ' + error.message);
  }
}

function onSearch() {
  const q = document.getElementById('search-inp').value.trim();
  const area = document.getElementById('result-area');
  const emptyState = document.getElementById('empty-state');

  // 관리자 모드 진입
  if (q.toLowerCase() === 'admin') {
    document.getElementById('search-inp').value = '';
    openAdminPanel();
    return;
  }

  if (!q) {
    area.innerHTML = '';
    if (emptyState) emptyState.style.display = '';
    return;
  }
  
  // 통계 기록
  trackSearch(q);
  
  if (emptyState) emptyState.style.display = 'none';

  const results = STUDENTS.filter(s => s.name.includes(q) || s.id.includes(q));
  if (!results.length) {
    area.innerHTML = '<div class="no-result">🔍 검색 결과가 없어요</div>'; return;
  }
  const searchCounter = document.createElement('div');
  searchCounter.className = 'search-counter';
  searchCounter.innerHTML = `<span class="count">${results.length}</span>명 검색됨`;
  
  area.innerHTML = searchCounter.outerHTML + results.map(s => {
    const carNum = s.group ? getCar(s.group) : '';
    const carClass = carNum ? `car-${carNum.charAt(0)}` : '';
    return `
    <div class="result-card" data-group="${s.group}" data-room="${s.room}">
      <div class="result-main">
        <div class="name-section">
          <div class="name-text">${s.name}</div>
          ${STAFF.has(s.name) ? '<span class="staff-badge">STAFF</span>' : ''}
        </div>
        <div class="info-compact">
          <span class="group-badge" onclick="showMembers('group','${s.group}')">
            조: ${s.group||'-'}
          </span>
          <span class="car-badge ${carClass}" onclick="showMembers('car','${carNum}')">
            차량: ${carNum||'-'}
          </span>
          <span class="room-badge" onclick="showMembers('room','${s.room}')">
            방번호: ${s.room||'-'}

        </div>

      <div class="student-id-compact">${s.id}</div>
    </div>
  `}).join('');
}

function openBrowse(type) {
  // 통계 기록
  trackBrowse(type);
  
  const overlay = document.createElement('div');
  overlay.className = 'browse-overlay';
  overlay.id = 'browse-overlay';

  const titles = { room:'🚪 방호수', group:'👥 조', car:'🚌 차량' };

  // 카테고리 목록 만들기
  let categories = {};
  STUDENTS.forEach(s => {
    let key = type === 'car' ? (s.group ? getCar(s.group) : '') : (type === 'room' ? s.room : s.group);
    if (!key) return;
    if (!categories[key]) categories[key] = 0;
    categories[key]++;
  });

  // 정렬
  let keys = Object.keys(categories);
  if (type === 'room') keys.sort((a,b) => parseInt(a)-parseInt(b));
  else if (type === 'group') keys.sort((a,b) => parseInt(a)-parseInt(b));
  else keys.sort();

  const cells = keys.map(k => `
    <div class="category-cell" onclick="showMembers('${type}','${k}')">
      <div class="c-val">${k}</div>
      <div class="c-cnt">${categories[k]}명</div>
    </div>
  `).join('');

  overlay.innerHTML = `
    <div class="browse-sheet">
      <div class="sheet-header">
        <div class="sheet-title">${titles[type]}</div>
        <button class="sheet-close" onclick="closeBrowse()">닫기</button>
      </div>
      <div class="category-grid">${cells}</div>
    </div>
  `;
  overlay.addEventListener('click', e => { if(e.target===overlay) closeBrowse(); });
  document.body.appendChild(overlay);
}

    htmlContent = htmlContent.replace(studentsRegex, newStudentsLine);
    
    const staffRegex = /const ENC_STAFF = \{[^}]+\};/;
    const newStaffLine = `const ENC_STAFF = ${JSON.stringify(newEncStaff)};`;
    htmlContent = htmlContent.replace(staffRegex, newStaffLine);

      htmlContent = '<!DOCTYPE html>\n' + htmlContent;

async function encryptData(plaintext, password) {
  const salt = 'ENYEONG2025TRIP';
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: enc.encode(salt), iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt']
  );
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(plaintext));
  const ciphertext = new Uint8Array(encrypted.slice(0, -16));
  const tag = new Uint8Array(encrypted.slice(-16));
  
  return {
    salt,
    iv: btoa(String.fromCharCode(...iv)),
    data: btoa(String.fromCharCode(...ciphertext)),
    tag: btoa(String.fromCharCode(...tag))
  };
}

// 벚꽃잎 애니메이션 함수 🌸
function createSakuraAnimation() {
  const container = document.getElementById('sakura-container');
  container.innerHTML = ''; // 기존 벚꽃 제거
  container.classList.add('active');
  
  // 모바일은 30개, 데스크탑은 50개
  const count = window.innerWidth < 900 ? 30 : 50;
  
  for (let i = 0; i < count; i++) {
    const sakura = document.createElement('div');
    sakura.className = 'sakura';
    
    // 랜덤 위치 (가로)
    sakura.style.left = Math.random() * 100 + '%';
    
    // 랜덤 애니메이션 지연 (0~1.5초)
    sakura.style.animationDelay = Math.random() * 1.5 + 's';
    
    // 랜덤 애니메이션 시간 (3~6초)
    sakura.style.animationDuration = (3 + Math.random() * 3) + 's';
    
    // 랜덤 가로 이동 거리
    const moveX = (Math.random() - 0.5) * 200; // -100 ~ 100px
    sakura.style.setProperty('--move-x', moveX + 'px');
    
    container.appendChild(sakura);
  }
  
  // 5초 후 페이드 아웃 시작
  setTimeout(() => {
    container.classList.remove('active');
    // 1초 후 완전히 제거
    setTimeout(() => {
      container.innerHTML = '';
    }, 1000);
  }, 5000);
}

// 모바일 레이아웃: 검색 결과를 버튼 위로
function applyMobileLayout() {
  if (window.innerWidth < 900) {
    const toolbar = document.querySelector('.toolbar');
    const splitLayout = document.querySelector('.split-layout');
    const browseBtns = document.querySelector('.browse-btns');
    
    // split-layout이 이미 toolbar 안에 있는지 확인
    if (splitLayout && splitLayout.parentElement !== toolbar) {
      toolbar.insertBefore(splitLayout, browseBtns);
    }
  } else {
    // 데스크탑: 원래 위치로 복원
    const toolbar = document.querySelector('.toolbar');
    const splitLayout = document.querySelector('.split-layout');
    const mainScreen = document.getElementById('main-screen');
    
    if (splitLayout && splitLayout.parentElement === toolbar) {
      mainScreen.appendChild(splitLayout);
    }
  }
}
