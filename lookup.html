<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="영어영문답사">
<meta name="theme-color" content="#fef6f9">
<title>영어영문답사 명단 조회 - 작업중</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:      #f9c7dc;
    --pink-mid:  #f0a0c0;
    --pink-deep: #c4607a;
    --pink-dark: #7a2e45;
    --bg:        #fef6f9;
    --surface:   #ffffff;
    --text:      #2c1018;
    --text-muted:#9a6475;
    --border:    rgba(249,199,220,0.6);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    max-width: 500px;
    width: 100%;
    background: var(--surface);
    border-radius: 20px;
    box-shadow: 0 4px 30px rgba(196,96,122,0.15);
    padding: 60px 40px;
    text-align: center;
    animation: fadeIn 0.5s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .icon {
    font-size: 80px;
    margin-bottom: 30px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  h1 {
    color: var(--pink-dark);
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 20px;
    line-height: 1.4;
  }
  p {
    color: var(--text-muted);
    font-size: 18px;
    line-height: 1.8;
    margin-bottom: 15px;
  }
  .highlight {
    color: var(--pink-deep);
    font-weight: 600;
  }
  .time-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--pink) 0%, var(--pink-mid) 100%);
    color: var(--pink-dark);
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: 600;
    margin-top: 20px;
    font-size: 16px;
  }
  @media (max-width: 600px) {
    .container { padding: 40px 30px; }
    h1 { font-size: 26px; }
    p { font-size: 16px; }
    .icon { font-size: 60px; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="icon">🔧</div>
    <h1>참가자 명단 교체작업 중</h1>
    <p>현재 참가자 명단을 업데이트하고 있습니다.</p>
    <p><span class="highlight">수십 분 내</span>에 정상화될 예정이오니</p>
    <p>잠시 후 다시 방문해 주시기 바랍니다.</p>
    <div class="time-badge">⏱️ 곧 완료됩니다</div>
  </div>
</body>
</html>
